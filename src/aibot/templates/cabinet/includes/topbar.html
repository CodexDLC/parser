<header class="fc-topbar">
    <a class="fc-brand" href="{{ layout.mount_path }}">{{ layout.brand_name }}</a>
    <nav class="fc-module-nav" aria-label="Разделы управления">
        {% for group in layout.header_groups %}
            {% for item in group.items %}
                <a
                    class="fc-nav-link{% if layout.active_module == item.key %} is-active{% endif %}"
                    href="{{ item.path }}"
                >
                    {% if item.icon %}<span aria-hidden="true">{{ item.icon }}</span>{% endif %}
                    {{ item.label }}
                </a>
            {% endfor %}
        {% endfor %}
    </nav>
    <form action="{{ layout.mount_path }}/logout" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button class="fc-button" type="submit">Выйти</button>
    </form>
</header>
