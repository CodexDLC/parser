services:
  postgres:
    image: postgres:16-alpine
    container_name: m4_postgres
    environment:
      POSTGRES_DB: m4
      POSTGRES_USER: m4
      POSTGRES_PASSWORD: m4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m4 -d m4"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: m4_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:

